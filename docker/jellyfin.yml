version: '3.8'

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped

    ports:
      - '8096:8096' # Web UI
      - '8920:8920' # HTTPS (optional)

    volumes:
      # Config + cache
      - D:/jellyfin/config:/config
      - D:/jellyfin/cache:/cache

      # Your media (you can rename this folder if needed)
      - D:/jellyfin/media:/media

    environment:
      - TZ=America/Edmonton # adjust if needed
